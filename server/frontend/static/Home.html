<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Cars | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            overflow-x: hidden;
        }

        /* Advanced Glass Navbar */
        .navbar {
            background: var(--glass) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            padding: 1rem 0;
        }

        .navbar-brand h2 {
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -1px;
        }

        .nav-link {
            font-weight: 500;
            color: #4b5563 !important;
            transition: all 0.3s ease;
            padding: 0.5rem 1.2rem !important;
        }

        .nav-link:hover, .nav-link.active {
            color: #3a7bd5 !important;
        }

        /* Session/User Links */
        .user-pill {
            background: #f1f5f9;
            padding: 5px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #e2e8f0;
        }

        .btn-auth {
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 12px;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-login { color: #3a7bd5; }
        .btn-register { 
            background: var(--primary-gradient);
            color: white !important;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.3);
        }

        /* Hero Section */
        .hero-section {
            height: 90vh;
            display: flex;
            align-items: center;
            background: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent),
                        radial-gradient(circle at bottom left, rgba(58, 123, 213, 0.1), transparent);
        }

        .hero-card {
            border: none;
            border-radius: 30px;
            overflow: hidden;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            transition: transform 0.4s ease;
        }

        .hero-image-container {
            position: relative;
            overflow: hidden;
            height: 400px;
        }

        .hero-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .hero-card:hover .hero-image-container img {
            transform: scale(1.05);
        }

        .hero-content {
            padding: 3rem;
            text-align: center;
        }

        .hero-content h1 {
            font-weight: 800;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #1f2937;
        }

        .btn-main {
            background: var(--primary-gradient);
            color: white;
            padding: 12px 35px;
            border-radius: 15px;
            font-weight: 700;
            border: none;
            box-shadow: 0 10px 20px rgba(58, 123, 213, 0.3);
            transition: 0.3s;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(58, 123, 213, 0.4);
            color: white;
        }
    </style>

    <script>
        // Modernized Logout
        const logout = async () => {
    let logout_url = window.location.origin + "/djangoapp/logout";

    const res = await fetch(logout_url, {
        method: "GET",
    });

    const json = await res.json();

    if (json) {
        let username = sessionStorage.getItem("username");
        sessionStorage.removeItem("username");
        window.location.href = window.location.origin;
        window.location.reload();
        alert("Logging out " + username + "...");
    } else {
        alert("The user could not be logged out.");
    }
};
        const checkSession = () => {
            const curr_user = sessionStorage.getItem("username");
            const target = document.getElementById("loginlogout");

            if (curr_user && curr_user !== "") {
                target.innerHTML = `
                    <div class="user-pill">
                        <i class="bi bi-person-circle text-primary"></i>
                        <span class="fw-bold">${curr_user}</span>
                        <div class="vr mx-2"></div>
                        <a href="#" onclick="logout()" class="text-danger text-decoration-none small fw-bold">Logout</a>
                    </div>`;
            } else {
                target.innerHTML = `
                    <div class="d-flex align-items-center gap-2">
                        <a class="btn-auth btn-login" href="/login">Login</a>
                        <a class="btn-auth btn-register" href="/register">Register</a>
                    </div>`;
            }
        };
    </script>
</head>

<body onload="checkSession()">

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/"><h2>DEALERSHIPS</h2></a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText">
            <i class="bi bi-list fs-2"></i>
        </button>
        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="/contact">Contact Us</a></li>
            </ul>
            <div id="loginlogout">
                </div>
        </div>
    </div>
</nav>

<section class="hero-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="hero-card">
                    <div class="hero-image-container">
                        <img src="static/car_dealership.jpg" alt="Premium Dealership">
                        <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to top, white, transparent);"></div>
                    </div>
                    <div class="hero-content">
                        <h6 class="text-primary fw-bold text-uppercase tracking-widest mb-3">Premium Automotive Experience</h6>
                        <h1>Find the Perfect Drive</h1>
                        <p class="text-muted lead mb-4">Discover a curated selection of world-class vehicles. From domestic powerhouses to exotic imports, your journey starts here.</p>
                        <a href="/dealers" class="btn btn-main btn-lg">
                            <i class="bi bi-car-front-fill me-2"></i> Browse Dealerships
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
